version: "3.9"

services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install poetry &&
             poetry install --no-root &&
             poetry run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    env_file:
      - .env

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
